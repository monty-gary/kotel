<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Interactive rainbow background with accessible controls and touch/mouse swirls." />
    <title>Rainbow Swirl</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="fallback-gradient" aria-hidden="true"></div>

    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <canvas id="fx-canvas" aria-hidden="true"></canvas>

    <main class="ui-shell">
      <section class="controls" aria-label="Visual controls">
        <h1>Rainbow Swirl</h1>

        <div class="control-group" data-control="brightness">
          <p class="control-label" id="brightness-label">Brightness</p>
          <div class="control-row">
            <label class="sr-only" for="brightness-slider">Brightness percentage</label>
            <input
              id="brightness-slider"
              class="control-slider"
              type="range"
              min="50"
              max="150"
              step="5"
              value="100"
              aria-labelledby="brightness-label"
            />
            <output id="brightness-value" class="value" aria-live="polite" aria-atomic="true" for="brightness-slider">100%</output>
          </div>
        </div>

        <div class="control-group" data-control="sharpness">
          <p class="control-label" id="sharpness-label">Sharpness</p>
          <div class="control-row">
            <label class="sr-only" for="sharpness-slider">Sharpness percentage</label>
            <input
              id="sharpness-slider"
              class="control-slider"
              type="range"
              min="0"
              max="100"
              step="5"
              value="50"
              aria-labelledby="sharpness-label"
            />
            <output id="sharpness-value" class="value" aria-live="polite" aria-atomic="true" for="sharpness-slider">50%</output>
          </div>
        </div>
      </section>

      <p id="motion-note" class="motion-note" hidden>
        Reduced motion is enabled, so visual animation is minimized.
      </p>
    </main>

    <noscript>
      <div class="noscript-note">
        JavaScript is disabled. Showing static rainbow fallback background.
      </div>
    </noscript>

    <script src="main.js" defer></script>
  </body>
</html>
